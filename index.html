<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Finanzas Personales</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  tailwind.config = {
    darkMode:'class',
    theme:{ extend:{ colors:{
      bg:'#0b0f14',surface:'#141a22',card:'#1b232d',line:'#253142',
      text:'#e6edf3',muted:'#8b97a8',brand:'#4f8cff',income:'#22c55e',expense:'#ef4444'
    }}}
  }
</script>
<style>
  html,body{background:#0b0f14;color:#e6edf3;height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;-webkit-tap-highlight-color:transparent;}
  .tab-active{background:#1b232d;color:#e6edf3;}.tab-inactive{color:#8b97a8;}
  .keypad-btn{user-select:none;transition:transform .05s ease,background .15s ease;}
  .keypad-btn:active{transform:scale(0.96);background:#253142;}
  .cat-chip{transition:all .15s ease;}
  .cat-chip.selected{outline:2px solid #4f8cff;outline-offset:2px;transform:translateY(-1px);}
  .modal-backdrop{background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);}
  input,select,textarea{background:#1b232d;color:#e6edf3;border:1px solid #253142;border-radius:8px;padding:8px 10px;outline:none;}
  input:focus,select:focus,textarea:focus{border-color:#4f8cff;}
  input[type="color"]{padding:2px 4px;height:40px;}
  ::-webkit-scrollbar{width:8px;height:8px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#253142;border-radius:4px;}
  .fade-in{animation:fi .2s ease;}
  @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .skeleton{background:linear-gradient(90deg,#1b232d 0%,#253142 50%,#1b232d 100%);background-size:200% 100%;animation:sk 1.2s infinite;}
  @keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}

  /* Auth screen */
  .auth-input-group{position:relative;}
  .auth-input-group input{width:100%;padding-left:40px;}
  .auth-input-group .auth-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#8b97a8;pointer-events:none;}
  .auth-msg{font-size:12px;border-radius:8px;padding:8px 12px;text-align:center;}
  .auth-msg.error{background:rgba(239,68,68,.12);color:#ef4444;}
  .auth-msg.success{background:rgba(34,197,94,.12);color:#22c55e;}
  .auth-btn{width:100%;padding:12px;border-radius:12px;font-weight:600;font-size:14px;transition:opacity .15s;background:#4f8cff;color:#fff;}
  .auth-btn:disabled{opacity:.6;cursor:not-allowed;}
  .auth-tab{flex:1;padding:8px;border-radius:10px;font-size:13px;font-weight:500;transition:all .15s;}

  /* Category card menu */
  .cat-card{position:relative;border-radius:12px;background:#1b232d;border:1px solid #253142;overflow:visible;}
  .cat-menu-btn{position:absolute;top:6px;right:6px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:7px;color:#8b97a8;transition:background .15s,color .15s;}
  .cat-menu-btn:hover{background:#253142;color:#e6edf3;}
  .cat-dropdown{position:absolute;top:34px;right:0;z-index:50;background:#141a22;border:1px solid #253142;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.5);min-width:140px;overflow:hidden;animation:fi .12s ease;}
  .cat-dropdown.hidden{display:none;}
  .cat-drop-item{display:flex;align-items:center;gap:8px;width:100%;text-align:left;padding:11px 14px;font-size:14px;transition:background .12s;}
  .cat-drop-item:hover{background:#1b232d;}.cat-drop-item.danger{color:#ef4444;}.cat-drop-item.disabled{color:#8b97a8;opacity:.5;cursor:not-allowed;}
  .cat-drop-divider{height:1px;background:#253142;}

  /* Control tab */
  .ctrl-section{border-radius:16px;background:#1b232d;border:1px solid #253142;overflow:hidden;}
  .ctrl-sec-header{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 16px;transition:background .15s;}
  .ctrl-sec-header:hover{background:rgba(37,49,66,.5);}
  .ctrl-sec-body{border-top:1px solid #253142;}
  .ctrl-item{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid #253142;transition:background .12s;}
  .ctrl-item:last-child{border-bottom:none;}.ctrl-item:hover{background:rgba(37,49,66,.3);}
  .ctrl-badge{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:999px;font-weight:500;}
  .badge-pending{background:rgba(234,179,8,.12);color:#eab308;}.badge-partial{background:rgba(79,140,255,.12);color:#4f8cff;}
  .badge-paid,.badge-collected{background:rgba(34,197,94,.12);color:#22c55e;}
  .ctrl-prog-track{height:5px;border-radius:99px;background:#253142;overflow:hidden;margin-top:5px;}
  .ctrl-prog-fill{height:100%;border-radius:99px;transition:width .3s;}
  .ctrl-iconbtn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:8px;color:#8b97a8;transition:background .12s,color .12s;flex-shrink:0;}
  .ctrl-iconbtn:hover{background:#253142;color:#e6edf3;}.ctrl-iconbtn.del:hover{color:#ef4444;}
  .sel-opt{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 8px;border-radius:14px;background:#1b232d;border:1px solid #253142;font-size:13px;font-weight:500;transition:border-color .15s,background .15s;}
  .sel-opt:hover{border-color:#4f8cff;background:#253142;}
  .sel-opt-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;}
  .toggle-paid{width:34px;height:34px;border-radius:50%;border:2px solid #253142;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
  .toggle-paid.paid{background:rgba(34,197,94,.15);border-color:#22c55e;}

  @media(max-width:639px){.sheet-wrap{align-items:flex-end!important;}.sheet-inner{border-radius:20px 20px 0 0!important;max-height:92vh!important;}}
  @media(min-width:640px){.ctrl-grid-4{grid-template-columns:repeat(4,1fr)!important;}.ctrl-2col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}}
</style>
</head>
<body class="dark">

<!-- ===== AUTH SCREEN ===== -->
<div id="authScreen" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 overflow-y-auto" style="background:#0b0f14;">
  <div class="w-full max-w-sm py-8">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4" style="background:rgba(79,140,255,.15);border:1px solid rgba(79,140,255,.3);">💰</div>
      <h1 class="text-2xl font-bold">Finanzas</h1>
      <p class="text-muted text-sm mt-1">Tu dinero, bajo control</p>
    </div>

    <!-- Tabs -->
    <div class="flex bg-card border border-line rounded-xl p-1 mb-5 gap-1">
      <button id="tabSignIn" class="auth-tab tab-active">Iniciar sesión</button>
      <button id="tabSignUp" class="auth-tab tab-inactive">Crear cuenta</button>
    </div>

    <!-- Sign In Form -->
    <div id="signInForm" class="space-y-3">
      <div class="auth-input-group">
        <svg class="auth-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <input id="siEmail" type="email" placeholder="Email" autocomplete="email" />
      </div>
      <div class="auth-input-group">
        <svg class="auth-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input id="siPassword" type="password" placeholder="Contraseña" autocomplete="current-password" />
      </div>
      <div id="siMsg" class="auth-msg hidden"></div>
      <button id="btnSignIn" class="auth-btn">Iniciar sesión</button>
    </div>

    <!-- Sign Up Form -->
    <div id="signUpForm" class="hidden space-y-3">
      <div class="auth-input-group">
        <svg class="auth-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <input id="suEmail" type="email" placeholder="Email" autocomplete="email" />
      </div>
      <div class="auth-input-group">
        <svg class="auth-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input id="suPassword" type="password" placeholder="Contraseña (mín. 6 caracteres)" autocomplete="new-password" />
      </div>
      <div class="auth-input-group">
        <svg class="auth-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input id="suConfirm" type="password" placeholder="Confirmar contraseña" autocomplete="new-password" />
      </div>
      <div id="suMsg" class="auth-msg hidden"></div>
      <button id="btnSignUp" class="auth-btn">Crear cuenta</button>
    </div>
  </div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="app" class="hidden min-h-screen flex flex-col">
  <header class="px-4 pt-4 pb-2 flex items-center justify-between">
    <div>
      <div class="text-muted text-xs uppercase tracking-widest">Balance actual</div>
      <div id="headerBalance" class="text-3xl font-semibold">$0,00</div>
    </div>
    <div class="flex items-center gap-2">
      <button id="btnSyncHeader" title="Sincronizar" class="p-2 rounded-lg bg-card hover:bg-line">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
      </button>
      <span id="syncStatus" class="text-xs text-muted"></span>
    </div>
  </header>

  <main id="pageContent" class="flex-1 overflow-y-auto px-4 pb-28"></main>

  <nav class="fixed bottom-0 left-0 right-0 bg-surface/90 backdrop-blur border-t border-line flex justify-around items-center py-1 z-20">
    <button data-tab="home" class="tab-btn flex flex-col items-center gap-0.5 px-2 py-1 rounded-lg text-[10px]">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>Inicio
    </button>
    <button data-tab="dashboard" class="tab-btn flex flex-col items-center gap-0.5 px-2 py-1 rounded-lg text-[10px]">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 15l4-4 3 3 5-6"/></svg>Dashboard
    </button>
    <button data-tab="control" class="tab-btn flex flex-col items-center gap-0.5 px-2 py-1 rounded-lg text-[10px]">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="15" x2="12" y2="15"/></svg>Control
    </button>
    <button data-tab="categories" class="tab-btn flex flex-col items-center gap-0.5 px-2 py-1 rounded-lg text-[10px]">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Categorías
    </button>
    <button data-tab="settings" class="tab-btn flex flex-col items-center gap-0.5 px-2 py-1 rounded-lg text-[10px]">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>Ajustes
    </button>
  </nav>
</div>

<!-- Transaction modal -->
<div id="txModal" class="hidden fixed inset-0 z-30 modal-backdrop items-center justify-center">
  <div class="bg-surface w-full max-w-md rounded-2xl border border-line fade-in mx-4 overflow-hidden">
    <div class="flex items-center justify-between p-4 border-b border-line">
      <h3 id="txTitle" class="text-lg font-semibold">Nuevo movimiento</h3>
      <button id="txClose" class="p-2 rounded-lg hover:bg-card"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="p-4 space-y-4">
      <div id="txAmountDisplay" class="text-center text-4xl font-semibold py-3 rounded-xl bg-card">$0</div>
      <div class="grid grid-cols-3 gap-2">
        <button class="keypad-btn bg-card py-4 text-xl rounded-xl" data-key="1">1</button><button class="keypad-btn bg-card py-4 text-xl rounded-xl" data-key="2">2</button><button class="keypad-btn bg-card py-4 text-xl rounded-xl" data-key="3">3</button>
        <button class="keypad-btn bg-card py-4 text-xl rounded-xl" data-key="4">4</button><button class="keypad-btn bg-card py-4 text-xl rounded-xl" data-key="5">5</button><button class="keypad-btn bg-card py-4 text-xl rounded-xl" data-key="6">6</button>
        <button class="keypad-btn bg-card py-4 text-xl rounded-xl" data-key="7">7</button><button class="keypad-btn bg-card py-4 text-xl rounded-xl" data-key="8">8</button><button class="keypad-btn bg-card py-4 text-xl rounded-xl" data-key="9">9</button>
        <button class="keypad-btn bg-card py-4 text-sm font-semibold rounded-xl" data-key="000">000</button><button class="keypad-btn bg-card py-4 text-xl rounded-xl" data-key="0">0</button><button class="keypad-btn bg-card py-4 text-xl rounded-xl" data-key="back">⌫</button>
      </div>
      <div><div class="text-xs text-muted uppercase tracking-wider mb-2">Categoría</div><div id="txCategories" class="grid grid-cols-4 gap-2 max-h-40 overflow-y-auto"></div></div>
      <div class="grid grid-cols-2 gap-2">
        <label class="text-sm"><span class="block text-xs text-muted mb-1">Fecha</span><input id="txDate" type="date" class="w-full" /></label>
        <label class="text-sm"><span class="block text-xs text-muted mb-1">Nota</span><input id="txNote" type="text" class="w-full" placeholder="Opcional" /></label>
      </div>
    </div>
    <div class="p-4 border-t border-line flex gap-2">
      <button id="txCancel" class="flex-1 py-3 rounded-xl bg-card">Cancelar</button>
      <button id="txSave" class="flex-1 py-3 rounded-xl bg-brand font-semibold">Guardar</button>
    </div>
  </div>
</div>

<!-- Category modal -->
<div id="catModal" class="hidden fixed inset-0 z-30 modal-backdrop items-center justify-center">
  <div class="bg-surface w-full max-w-md rounded-2xl border border-line fade-in mx-4">
    <div class="flex items-center justify-between p-4 border-b border-line">
      <h3 id="catTitle" class="text-lg font-semibold">Nueva categoría</h3>
      <button id="catClose" class="p-2 rounded-lg hover:bg-card"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="p-4 space-y-3">
      <label class="block text-sm"><span class="block text-xs text-muted mb-1">Nombre</span><input id="catName" type="text" class="w-full" placeholder="Ej: Transporte" /></label>
      <label class="block text-sm"><span class="block text-xs text-muted mb-1">Tipo</span><select id="catType" class="w-full"><option value="expense">Egreso</option><option value="income">Ingreso</option></select></label>
      <label class="block text-sm"><span class="block text-xs text-muted mb-1">Ícono (emoji)</span><input id="catIcon" type="text" class="w-full" maxlength="4" placeholder="🛒" /></label>
      <label class="block text-sm"><span class="block text-xs text-muted mb-1">Color</span><input id="catColor" type="color" class="w-full" value="#4f8cff" /></label>
    </div>
    <div class="p-4 border-t border-line flex gap-2">
      <button id="catCancel" class="flex-1 py-3 rounded-xl bg-card">Cancelar</button>
      <button id="catSave" class="flex-1 py-3 rounded-xl bg-brand font-semibold">Guardar</button>
    </div>
  </div>
</div>

<!-- Confirm modal -->
<div id="confirmModal" class="hidden fixed inset-0 z-40 modal-backdrop items-center justify-center">
  <div class="bg-surface w-full max-w-xs rounded-2xl border border-line fade-in mx-4 overflow-hidden">
    <div class="p-5 space-y-2">
      <h3 id="confirmTitle" class="font-semibold text-base">Eliminar</h3>
      <p id="confirmMsg" class="text-sm text-muted leading-relaxed"></p>
    </div>
    <div class="flex border-t border-line">
      <button id="confirmCancel" class="flex-1 py-3 text-sm rounded-bl-2xl hover:bg-card transition-colors">Cancelar</button>
      <div class="w-px bg-line"></div>
      <button id="confirmOk" class="flex-1 py-3 text-sm text-expense font-semibold rounded-br-2xl hover:bg-expense/10 transition-colors">Eliminar</button>
    </div>
  </div>
</div>

<!-- Control: Type selector sheet -->
<div id="selectorSheet" class="hidden fixed inset-0 z-30 modal-backdrop sheet-wrap flex items-end sm:items-center justify-center">
  <div class="sheet-inner bg-surface w-full sm:max-w-sm rounded-t-2xl sm:rounded-2xl border border-line fade-in">
    <div class="w-10 h-1 bg-line rounded-full mx-auto mt-3 mb-1 sm:hidden"></div>
    <div class="px-4 py-3 border-b border-line flex items-center justify-between">
      <h3 class="font-semibold">¿Qué querés agregar?</h3>
      <button id="selectorClose" class="p-1.5 rounded-lg hover:bg-card"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="p-4 grid grid-cols-2 gap-3">
      <button class="sel-opt" data-type="fixed"><span class="sel-opt-icon" style="background:#f59e0b22;">🔁</span>Gasto fijo</button>
      <button class="sel-opt" data-type="variable"><span class="sel-opt-icon" style="background:#4f8cff22;">📊</span>Presupuesto variable</button>
      <button class="sel-opt" data-type="debt"><span class="sel-opt-icon" style="background:#ef444422;">💳</span>Deuda</button>
      <button class="sel-opt" data-type="receivable"><span class="sel-opt-icon" style="background:#22c55e22;">🤝</span>Por cobrar</button>
    </div>
    <div class="px-4 pb-4"><button id="selectorCancelBtn" class="w-full py-3 rounded-xl bg-card text-sm">Cancelar</button></div>
  </div>
</div>

<!-- Fixed cost modal -->
<div id="fixedModal" class="hidden fixed inset-0 z-30 modal-backdrop items-center justify-center">
  <div class="bg-surface w-full max-w-md rounded-2xl border border-line fade-in mx-4 max-h-[92vh] flex flex-col">
    <div class="flex items-center justify-between p-4 border-b border-line flex-shrink-0">
      <h3 id="fixedModalTitle" class="text-lg font-semibold">Nuevo gasto fijo</h3>
      <button id="fixedModalClose" class="p-2 rounded-lg hover:bg-card"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>

/* =========================================================================

const APP_VERSION = '1.1.0'; // ← incrementar en cada deploy para forzar actualización

const SYSTEM_CATEGORY_NAMES = ['Otros Ing.','Otros Eg.'];

const DEFAULT_CATEGORIES = [

  {name:'Hogar',type:'expense',icon:'🏠',color:'#eab308'},{name:'Salud',type:'expense',icon:'🏥',color:'#ec4899'},
  {name:'Ocio',type:'expense',icon:'🎮',color:'#8b5cf6'},{name:'Educación',type:'expense',icon:'📚',color:'#3b82f6'},
  {name:'Ropa',type:'expense',icon:'👕',color:'#06b6d4'},{name:'Servicios',type:'expense',icon:'💡',color:'#f59e0b'},
  {name:'Otros Eg.',type:'expense',icon:'🧾',color:'#64748b'},
];

// ------- STATE -------
const state = {
  tab:'home', transactions:[], categories:[], settings:{currency:'ARS',currencySymbol:'$',supabaseUrl:'',supabaseKey:''},
  supabase:null, user:null,
  txModalOpen:false, txType:'expense', txAmountRaw:'', txCategoryId:null,
  dashMonth:currentMonthKey(), chart:null,
  fixedCosts:[], fixedCostRecords:[], variableBudgets:[], debts:[], receivables:[],
  controlMonth:currentMonthKey(), ctrlSections:{fixed:true,variable:true,debt:true,recv:true},
};

// ------- UTIL -------
function currentMonthKey(d=new Date()){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function todayIso(){const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,10);}
function uid(){return 'x-'+Math.random().toString(36).slice(2,10)+Date.now().toString(36);}
function fmtMoney(n){const abs=Math.abs(n);const s=new Intl.NumberFormat('es-AR',{minimumFractionDigits:0,maximumFractionDigits:0}).format(abs);return `${n<0?'-':''}${state.settings.currencySymbol}${s}`;}
function parseAmount(raw){if(!raw)return 0;const n=parseInt(raw.replace(/\D/g,''),10);return isNaN(n)?0:n;}
function showToast(msg,ms=2400){const t=document.getElementById('toast');t.textContent=msg;t.classList.remove('hidden');clearTimeout(showToast._t);showToast._t=setTimeout(()=>t.classList.add('hidden'),ms);}
function isSystemCategory(cat){return SYSTEM_CATEGORY_NAMES.includes(cat.name);}
function formatMonthLabel(key){const[y,m]=key.split('-').map(Number);return new Date(y,m-1,1).toLocaleDateString('es-AR',{month:'long',year:'numeric'});}
function isValidEmail(e){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);}

// ------- CONTROL: localStorage con prefijo por usuario -------
function ctrlKey(name){const uid=state.user?.id;return uid?`u_${uid.slice(0,8)}_${name}`:name;}
const saveFC  = ()=>localStorage.setItem(ctrlKey('fin_fc'),   JSON.stringify(state.fixedCosts));
const saveFR  = ()=>localStorage.setItem(ctrlKey('fin_fr'),   JSON.stringify(state.fixedCostRecords));
const saveVB  = ()=>localStorage.setItem(ctrlKey('fin_vb'),   JSON.stringify(state.variableBudgets));
const saveDB  = ()=>localStorage.setItem(ctrlKey('fin_db'),   JSON.stringify(state.debts));
const saveRCV = ()=>localStorage.setItem(ctrlKey('fin_rcv'),  JSON.stringify(state.receivables));
function loadControlData(){
  const p=(name,def=[])=>{try{return JSON.parse(localStorage.getItem(ctrlKey(name))||'null')||def;}catch{return def;}};
  state.fixedCosts=p('fin_fc'); state.fixedCostRecords=p('fin_fr');
  state.variableBudgets=p('fin_vb'); state.debts=p('fin_db'); state.receivables=p('fin_rcv');
}

// ------- LOCAL STORAGE (configuración) -------
function loadSettings(){
  try{state.settings=Object.assign(state.settings,JSON.parse(localStorage.getItem(STORAGE_KEYS.settings)||'{}'));}catch{}
}
const saveLocalSettings=()=>localStorage.setItem(STORAGE_KEYS.settings,JSON.stringify(state.settings));

// ------- SUPABASE INIT -------
function initSupabase(){
  // Usa credenciales de settings si las tiene, si no usa las constantes hardcodeadas
  const url = state.settings.supabaseUrl || SUPABASE_URL;
  const key = state.settings.supabaseKey || SUPABASE_ANON_KEY;
  if(url&&key&&window.supabase){
    try{state.supabase=window.supabase.createClient(url,key);return true;}
    catch(e){state.supabase=null;}
  }else{state.supabase=null;}return false;
}
let _syncInProgress=false; // guard: evita syncs paralelos
function setSyncStatus(text){document.getElementById('syncStatus').textContent=text;}

// ------- AUTH UI -------
function showAuthScreen(){
  document.getElementById('authScreen').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
}
function showApp(){
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
}
function switchAuthTab(tab){
  const isIn=tab==='signin';
  document.getElementById('signInForm').classList.toggle('hidden',!isIn);
  document.getElementById('signUpForm').classList.toggle('hidden',isIn);
  document.getElementById('tabSignIn').classList.toggle('tab-active',isIn);
  document.getElementById('tabSignIn').classList.toggle('tab-inactive',!isIn);
  document.getElementById('tabSignUp').classList.toggle('tab-active',!isIn);
  document.getElementById('tabSignUp').classList.toggle('tab-inactive',isIn);
  document.getElementById('siMsg').classList.add('hidden');
  document.getElementById('suMsg').classList.add('hidden');
}
function setAuthMsg(elId,msg,type='error'){
  const el=document.getElementById(elId);
  el.textContent=msg;el.className=`auth-msg ${type}`;el.classList.remove('hidden');
}
function setAuthBtnLoading(btnId,loading,normalText){
  const btn=document.getElementById(btnId);
  btn.textContent=loading?'Cargando…':normalText;
  btn.disabled=loading;
}
function translateAuthError(msg){
  const map={
    'Invalid login credentials':'Email o contraseña incorrectos',
    'Email not confirmed':'El email no fue confirmado. Contactá al administrador.',
    'User already registered':'Este email ya tiene una cuenta',
    'Password should be at least 6 characters':'La contraseña debe tener al menos 6 caracteres',
    'Unable to validate email address: invalid format':'Formato de email inválido',
    'signup is disabled':'El registro está deshabilitado',
    'email rate limit exceeded':'Demasiados intentos. Esperá unos minutos',
    'over_email_send_rate_limit':'Demasiados intentos. Esperá unos minutos',
  };
  for(const[k,v] of Object.entries(map)){if(msg.toLowerCase().includes(k.toLowerCase()))return v;}
  return msg;
}

// ------- AUTH ACTIONS -------
async function doSignIn(){
  const email=document.getElementById('siEmail').value.trim();
  const password=document.getElementById('siPassword').value;
  document.getElementById('siMsg').classList.add('hidden');
  if(!email){setAuthMsg('siMsg','Ingresá tu email');return;}
  if(!isValidEmail(email)){setAuthMsg('siMsg','Email inválido');return;}
  if(!password){setAuthMsg('siMsg','Ingresá tu contraseña');return;}
  setAuthBtnLoading('btnSignIn',true,'Iniciar sesión');
  const{error}=await state.supabase.auth.signInWithPassword({email,password});
  setAuthBtnLoading('btnSignIn',false,'Iniciar sesión');
  if(error)setAuthMsg('siMsg',translateAuthError(error.message));
  // onAuthStateChange maneja el redirect si OK
}

async function doSignUp(){
  const email=document.getElementById('suEmail').value.trim();
  const password=document.getElementById('suPassword').value;
  const confirm=document.getElementById('suConfirm').value;
  document.getElementById('suMsg').classList.add('hidden');
  if(!email){setAuthMsg('suMsg','Ingresá tu email');return;}
  if(!isValidEmail(email)){setAuthMsg('suMsg','Email inválido');return;}
  if(!password){setAuthMsg('suMsg','Ingresá una contraseña');return;}
  if(password.length<6){setAuthMsg('suMsg','La contraseña debe tener al menos 6 caracteres');return;}
  if(password!==confirm){setAuthMsg('suMsg','Las contraseñas no coinciden');return;}
  setAuthBtnLoading('btnSignUp',true,'Crear cuenta…');
  const{data,error}=await state.supabase.auth.signUp({email,password});
  setAuthBtnLoading('btnSignUp',false,'Crear cuenta');
  if(error){setAuthMsg('suMsg',translateAuthError(error.message));return;}
  // Con confirmación de email desactivada en Supabase, data.session viene directo
  // y onAuthStateChange → onSession() abre la app automáticamente.
  // Si por alguna razón no hay sesión inmediata, avisamos.
  if(!data.session){
    setAuthMsg('suMsg','Cuenta creada. Iniciá sesión para entrar.','success');
  }
}

function doSignOut(){
  // confirm() nativo está bloqueado en iOS Safari PWA → usamos el modal propio
  showConfirmModal({
    title:'Cerrar sesión',
    message:'¿Estás seguro de que querés cerrar sesión?',
    okText:'Cerrar sesión',
    okClass:'text-expense',
    onConfirm:async()=>{
      try{
        await state.supabase.auth.signOut();
        // onAuthStateChange → SIGNED_OUT → onSignOut() limpia el estado
      }catch(e){
        console.error('Error en signOut:',e);
        onSignOut(); // forzar logout local si Supabase falla
      }
    }
  });
}

// ------- SESSION HANDLER -------
async function onSession(session){
  state.user=session.user;
  loadControlData(); // cargar datos de Control con prefijo del usuario
  showApp();
  setTab(state.tab||'home');
  await syncFromSupabase();
}

function onSignOut(){
  state.user=null;
  state.transactions=[];state.categories=[];
  state.fixedCosts=[];state.fixedCostRecords=[];
  state.variableBudgets=[];state.debts=[];state.receivables=[];
  showAuthScreen();
}

// ------- SUPABASE SYNC -------
async function syncFromSupabase(){
  if(!state.supabase||!state.user){setSyncStatus('');return;}
  // Guard: evita múltiples syncs simultáneos (clicks repetidos, refresh de token, etc.)
  if(_syncInProgress){return;}
  _syncInProgress=true;
  let timeoutId;
  try{
    setSyncStatus('sincronizando…');
    // Timeout de 15 s: evita que la app quede trabada si Supabase no responde
    const timeout=new Promise((_,rej)=>{
      timeoutId=setTimeout(()=>rej(new Error('Timeout de red (15 s). Revisá tu conexión.')),15000);
    });
    // Queries con filtro por user_id — indispensable con RLS habilitado
    const queryAll=Promise.all([
      state.supabase.from('categories').select('*')
        .eq('user_id',state.user.id)
        .order('type').order('name'),
      state.supabase.from('transactions').select('*')
        .eq('user_id',state.user.id)
        .order('date',{ascending:false}),
    ]);
    const [{data:cats,error:e1},{data:txs,error:e2}]=await Promise.race([queryAll,timeout]);
    clearTimeout(timeoutId);
    if(e1||e2)throw(e1||e2);
    // Mapear categorías del usuario
    const mapped=(cats||[]).map(c=>({id:c.id,name:c.name,type:c.type,icon:c.icon||'💠',color:c.color||'#4f8cff'}));
    state.categories=mapped;
    // Insertar categorías predeterminadas faltantes (solo las que no están)
    const seeded=await ensureDefaultCategories(mapped);
    if(seeded.length)state.categories=[...state.categories,...seeded];
    if(txs){
      state.transactions=txs.map(t=>({id:t.id,amount:Number(t.amount),type:t.type,category_id:t.category_id,date:t.date,note:t.note||'',created_at:t.created_at}));
    }
    setSyncStatus('✓ sincronizado');
    renderCurrentTab();
  }catch(err){
    clearTimeout(timeoutId);
    console.error('syncFromSupabase error:',err);
    setSyncStatus('⚠ sin sync');
    showToast('Error de sincronización: '+(err.message||'revisá tu conexión'));
    renderCurrentTab(); // renderizar de todas formas con el estado actual
  }finally{
    _syncInProgress=false;
  }
}

// Inserta solo las categorías predeterminadas que le faltan al usuario (por nombre)
async function ensureDefaultCategories(existing){
  if(!state.supabase||!state.user)return[];
  const existingNames=new Set(existing.map(c=>c.name));
  const missing=DEFAULT_CATEGORIES.filter(c=>!existingNames.has(c.name));
  if(!missing.length)return[];
  const rows=missing.map(c=>({name:c.name,type:c.type,icon:c.icon,color:c.color,user_id:state.user.id}));
  const{data,error}=await state.supabase.from('categories').insert(rows).select();
  if(error){console.error('Error seeding categories:',error);return[];}
  return(data||[]).map(c=>({id:c.id,name:c.name,type:c.type,icon:c.icon||'💠',color:c.color||'#4f8cff'}));
}

// Supabase remote ops — todas incluyen user_id
async function remoteInsertTx(tx){
  if(!state.supabase||!state.user)return;
  const{error}=await state.supabase.from('transactions').insert({id:tx.id,amount:tx.amount,type:tx.type,category_id:tx.category_id,date:tx.date,note:tx.note,user_id:state.user.id});
  if(error)throw error;
}
async function remoteDeleteTx(id){
  if(!state.supabase||!state.user)return;
  const{error}=await state.supabase.from('transactions').delete().eq('id',id).eq('user_id',state.user.id);
  if(error)throw error;
}
async function remoteUpsertCat(cat){
  if(!state.supabase||!state.user)return;
  const{error}=await state.supabase.from('categories').upsert({id:cat.id,name:cat.name,type:cat.type,icon:cat.icon,color:cat.color,user_id:state.user.id});
  if(error)throw error;
}
async function remoteDeleteCat(id){
  if(!state.supabase||!state.user)return;
  const{error}=await state.supabase.from('categories').delete().eq('id',id).eq('user_id',state.user.id);
  if(error)throw error;
}
async function remoteMigrateCatTxs(fromId,toId){
  if(!state.supabase||!state.user)return;
  const{error}=await state.supabase.from('transactions').update({category_id:toId}).eq('category_id',fromId).eq('user_id',state.user.id);
  if(error)throw error;
}

// ------- HELPERS -------
function getCategory(id){return state.categories.find(c=>c.id===id);}
function getActualSpending(catId,mk){return state.transactions.filter(t=>t.category_id===catId&&t.type==='expense'&&(t.date||'').slice(0,7)===mk).reduce((s,t)=>s+t.amount,0);}
function totalsAll(){let i=0,e=0;for(const t of state.transactions){if(t.type==='income')i+=t.amount;else e+=t.amount;}return{income:i,expense:e,balance:i-e};}
function totalsByMonth(mk){let i=0,e=0;const byCat={};for(const t of state.transactions){if((t.date||'').slice(0,7)!==mk)continue;if(t.type==='income')i+=t.amount;else e+=t.amount;if(t.type==='expense')byCat[t.category_id]=(byCat[t.category_id]||0)+t.amount;}return{income:i,expense:e,balance:i-e,byCat};}
function debtTypeLabel(t){return{loan:'Préstamo',card:'Tarjeta',current_account:'Cta. cte.',other:'Otro'}[t]||t;}
function rcvTypeLabel(t){return{loan:'Préstamo',current_account:'Cta. cte.',sale:'Venta',other:'Otro'}[t]||t;}
function statusLabel(s){return{pending:'Pendiente',partial:'Parcial',paid:'Saldado',collected:'Cobrado'}[s]||s;}
function statusClass(s){return{pending:'badge-pending',partial:'badge-partial',paid:'badge-paid',collected:'badge-collected'}[s]||'badge-pending';}

function renderPie(byCat,legendEl){
  const canvas=document.getElementById('pieChart');if(!canvas)return;
  const entries=Object.entries(byCat).map(([cid,v])=>{const c=getCategory(cid)||{name:'Sin cat.',color:'#8b97a8'};return{name:c.name,color:c.color,value:v};}).sort((a,b)=>b.value-a.value);
  if(state.chart){state.chart.destroy();state.chart=null;}
  if(!entries.length){legendEl.innerHTML='<div class="text-muted text-center text-sm">Sin egresos este mes</div>';return;}
  state.chart=new Chart(canvas.getContext('2d'),{type:'doughnut',data:{labels:entries.map(e=>e.name),datasets:[{data:entries.map(e=>e.value),backgroundColor:entries.map(e=>e.color),borderWidth:2,borderColor:'#141a22'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${fmtMoney(ctx.parsed)}`}}},cutout:'60%'}});
  const total=entries.reduce((s,e)=>s+e.value,0);
  legendEl.innerHTML=entries.map(e=>`<div class="flex items-center justify-between text-sm"><div class="flex items-center gap-2 min-w-0"><span class="w-3 h-3 rounded-sm inline-block" style="background:${e.color}"></span><span class="truncate">${e.name}</span></div><div class="flex items-center gap-3 text-muted"><span>${((e.value/total)*100).toFixed(1)}%</span><span class="text-text font-medium">${fmtMoney(e.value)}</span></div></div>`).join('');
}

// ------- VIEW: CONTROL -------
function ensureFixedRecords(mk){
  const existing=new Set(state.fixedCostRecords.filter(r=>r.month===mk).map(r=>r.fixedCostId));
  let changed=false;
  for(const fc of state.fixedCosts){
    if(!fc.active||existing.has(fc.id))continue;
    const cm=(fc.createdAt||'').slice(0,7);if(cm&&mk<cm)continue;
    state.fixedCostRecords.push({id:uid(),fixedCostId:fc.id,month:mk,amount:fc.amount,status:'pending',paidAt:null});
    changed=true;
  }
  if(changed)saveFR();
}
function viewControl(){
  ensureFixedRecords(state.controlMonth);
  const root=document.createElement('div');root.className='fade-in space-y-4';
  const hdr=document.createElement('div');hdr.className='flex items-center justify-between';

function buildControlSummary(){
  const mk=state.controlMonth;
  const recs=state.fixedCostRecords.filter(r=>r.month===mk);
  const fixedTotal=recs.reduce((s,r)=>s+r.amount,0);
  const fixedPending=recs.filter(r=>r.status==='pending').reduce((s,r)=>s+r.amount,0);
  const buds=state.variableBudgets.filter(b=>b.month===mk);
  const varSpent=buds.reduce((s,b)=>s+getActualSpending(b.categoryId,mk),0);
  const varBudgeted=buds.reduce((s,b)=>s+b.budgeted,0);
  const debtP=state.debts.filter(d=>d.status!=='paid').reduce((s,d)=>s+(d.totalAmount-d.paidAmount),0);
  const recvP=state.receivables.filter(r=>r.status!=='collected').reduce((s,r)=>s+(r.totalAmount-r.collectedAmount),0);
  const wrap=document.createElement('div');wrap.className='grid grid-cols-2 gap-2 ctrl-grid-4';
  wrap.innerHTML=`
    <div class="rounded-xl bg-card border border-line p-3"><div class="text-xs text-muted mb-1">Fijos del mes</div><div class="font-semibold">${fmtMoney(fixedTotal)}</div><div class="text-xs mt-1 ${fixedPending>0?'text-yellow-400':'text-income'}">${fixedPending>0?fmtMoney(fixedPending)+' pendiente':'Todo pagado'}</div></div>
    <div class="rounded-xl bg-card border border-line p-3"><div class="text-xs text-muted mb-1">Variables del mes</div><div class="font-semibold">${fmtMoney(varSpent)}</div><div class="text-xs text-muted mt-1">de ${fmtMoney(varBudgeted)} presup.</div></div>
    <div class="rounded-xl bg-card border border-line p-3"><div class="text-xs text-muted mb-1">Debo</div><div class="font-semibold ${debtP>0?'text-expense':''}">${fmtMoney(debtP)}</div><div class="text-xs text-muted mt-1">${state.debts.filter(d=>d.status!=='paid').length} deuda(s)</div></div>
    <div class="rounded-xl bg-card border border-line p-3"><div class="text-xs text-muted mb-1">Me deben</div><div class="font-semibold ${recvP>0?'text-income':''}">${fmtMoney(recvP)}</div><div class="text-xs text-muted mt-1">${state.receivables.filter(r=>r.status!=='collected').length} pendiente(s)</div></div>`;
  return wrap;
}

// Control section builder
function buildCtrlSection(key,title,count,fillBody){
  const open=state.ctrlSections[key]!==false;
  const section=document.createElement('div');section.className='ctrl-section';
  const header=document.createElement('button');header.className='ctrl-sec-header';
  header.innerHTML=`<div class="flex items-center gap-2"><span class="font-semibold text-sm">${title}</span>${count>0?`<span class="text-xs bg-line text-muted px-2 py-0.5 rounded-full">${count}</span>`:''}</div><svg class="chevron transition-transform duration-200 ${open?'':'rotate-180'}" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>`;
  const body=document.createElement('div');body.className=`ctrl-sec-body${open?'':' hidden'}`;
  fillBody(body);
  header.onclick=()=>{const isOpen=!body.classList.contains('hidden');body.classList.toggle('hidden',isOpen);header.querySelector('.chevron').classList.toggle('rotate-180',isOpen);state.ctrlSections[key]=!isOpen;};
  section.appendChild(header);section.appendChild(body);return section;
}
const ICON_EDIT=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;

function buildFixedItem(rec,fc){

function buildVariableSection(){
  const mk=state.controlMonth;const buds=state.variableBudgets.filter(b=>b.month===mk);

function buildVariableItem(b,mk){
  const cat=getCategory(b.categoryId)||{name:'Sin cat.',icon:'•',color:'#8b97a8'};
  const spent=getActualSpending(b.categoryId,mk);
  const pct=b.budgeted>0?Math.min((spent/b.budgeted)*100,100):0;
  const over=spent>b.budgeted;
  const el=document.createElement('div');el.className='ctrl-item flex-col items-start gap-1';
  el.innerHTML=`
    <div class="flex items-center justify-between w-full">
      <div class="flex items-center gap-2"><span class="text-lg">${cat.icon}</span><span class="text-sm font-medium">${cat.name}</span></div>
      <div class="flex items-center gap-1"><span class="text-sm font-semibold ${over?'text-expense':''}">${fmtMoney(spent)}<span class="text-muted font-normal"> / ${fmtMoney(b.budgeted)}</span></span><button class="ctrl-iconbtn edit-btn">${ICON_EDIT}</button><button class="ctrl-iconbtn del del-btn">${ICON_DEL}</button></div>

}

function openTxModal(type){
  state.txType=type;state.txAmountRaw='';state.txCategoryId=null;
  document.getElementById('txTitle').textContent=type==='income'?'Nuevo Ingreso':'Nuevo Egreso';
  document.getElementById('txDate').value=todayIso();document.getElementById('txNote').value='';
  updateTxAmountDisplay();renderTxCategories();
  const m=document.getElementById('txModal');m.classList.remove('hidden');m.classList.add('flex');state.txModalOpen=true;
}
function closeTxModal(){const m=document.getElementById('txModal');m.classList.add('hidden');m.classList.remove('flex');state.txModalOpen=false;}
function updateTxAmountDisplay(){
  const el=document.getElementById('txAmountDisplay');el.textContent=fmtMoney(parseAmount(state.txAmountRaw));
  el.className='text-center text-4xl font-semibold py-3 rounded-xl bg-card '+(state.txType==='income'?'text-income':'text-expense');
}
function keypadPress(key){
  if(key==='back'){
    state.txAmountRaw=state.txAmountRaw.slice(0,-1);
  }else if(key==='000'){
    if(state.txAmountRaw&&state.txAmountRaw!=='0'){
      const next=state.txAmountRaw+'000';
      if(next.length<=10)state.txAmountRaw=next;
    }
  }else{
    if(state.txAmountRaw==='0'||!state.txAmountRaw)state.txAmountRaw=key;
    else state.txAmountRaw+=key;
    if(state.txAmountRaw.length>10)state.txAmountRaw=state.txAmountRaw.slice(0,10);
  }
  updateTxAmountDisplay();
}
function renderTxCategories(){
  const wrap=document.getElementById('txCategories');wrap.innerHTML='';
  for(const c of state.categories.filter(c=>c.type===state.txType)){
    const btn=document.createElement('button');btn.className='cat-chip bg-card border border-line rounded-xl p-2 flex flex-col items-center gap-1';
    btn.innerHTML=`<span class="w-9 h-9 rounded-full flex items-center justify-center text-lg" style="background:${c.color}22;border:1px solid ${c.color}66;">${c.icon||'•'}</span><span class="text-xs truncate max-w-full">${c.name}</span>`;
    btn.onclick=()=>{state.txCategoryId=c.id;[...wrap.children].forEach(x=>x.classList.remove('selected'));btn.classList.add('selected');};
    wrap.appendChild(btn);
  }
}
async function saveTransaction(){
  const amount=parseAmount(state.txAmountRaw);
  if(!amount||amount<=0){showToast('Ingresá un monto');return;}
  if(!state.txCategoryId){showToast('Elegí una categoría');return;}
  const tx={id:uid(),amount,type:state.txType,category_id:state.txCategoryId,date:document.getElementById('txDate').value||todayIso(),note:document.getElementById('txNote').value.trim(),created_at:new Date().toISOString()};
  state.transactions.unshift(tx);
  try{await remoteInsertTx(tx);}catch{showToast('Guardado (sync falló)');}
  closeTxModal();renderCurrentTab();showToast(state.txType==='income'?'Ingreso agregado':'Egreso agregado');
}
async function deleteTransaction(id){
  state.transactions=state.transactions.filter(t=>t.id!==id);
  try{await remoteDeleteTx(id);}catch{}renderCurrentTab();
}

let catEditing=null;
function openCatModal(cat){
  catEditing=cat||null;
  document.getElementById('catTitle').textContent=cat?'Editar categoría':'Nueva categoría';
  document.getElementById('catName').value=cat?.name||'';document.getElementById('catType').value=cat?.type||'expense';
  document.getElementById('catIcon').value=cat?.icon||'💠';document.getElementById('catColor').value=cat?.color||'#4f8cff';
  const m=document.getElementById('catModal');m.classList.remove('hidden');m.classList.add('flex');
}
function closeCatModal(){const m=document.getElementById('catModal');m.classList.add('hidden');m.classList.remove('flex');catEditing=null;}
async function saveCategory(){
  const name=document.getElementById('catName').value.trim(),type=document.getElementById('catType').value,icon=document.getElementById('catIcon').value.trim()||'💠',color=document.getElementById('catColor').value;
  if(!name){showToast('Ingresá un nombre');return;}
  if(state.categories.find(c=>c.name.toLowerCase()===name.toLowerCase()&&c.type===type&&c.id!==catEditing?.id)){showToast(`Ya existe "${name}" en ese tipo`);return;}
  if(catEditing){Object.assign(catEditing,{name,type,icon,color});try{await remoteUpsertCat(catEditing);}catch{}closeCatModal();renderCurrentTab();showToast('Categoría actualizada');}
  else{const nc={id:uid(),name,type,icon,color};state.categories.push(nc);try{await remoteUpsertCat(nc);}catch{}closeCatModal();renderCurrentTab();showToast('Categoría creada');}
}
function confirmDeleteCategory(cat){
  if(isSystemCategory(cat)){showToast('Categoría del sistema, no eliminable');return;}
  const used=state.transactions.filter(t=>t.category_id===cat.id).length;
  const fbName=cat.type==='income'?'Otros Ing.':'Otros Eg.';
  const fb=state.categories.find(c=>c.name===fbName&&c.type===cat.type);
  let msg=`¿Eliminar "${cat.name}"?`;
  if(used>0)msg+=fb?` ${used} movimiento(s) se moverán a "${fbName}".`:` ${used} movimiento(s) quedarán sin categoría.`;
  showConfirmModal({title:'Eliminar categoría',message:msg,onConfirm:()=>executeCategoryDelete(cat,fb)});
}
async function executeCategoryDelete(cat,fb){
  if(fb){for(const tx of state.transactions)if(tx.category_id===cat.id)tx.category_id=fb.id;try{await remoteMigrateCatTxs(cat.id,fb.id);}catch{}}
  state.categories=state.categories.filter(c=>c.id!==cat.id);
  try{await remoteDeleteCat(cat.id);}catch{}
  renderCurrentTab();showToast(fb?`Eliminada. Movimientos → "${fb.name}".`:'Categoría eliminada.');
}

// ------- SERVICE WORKER & ACTUALIZACIONES -------
let _swRegistration = null;

function registerSW(){
  if(!('serviceWorker' in navigator)) return;

  navigator.serviceWorker.register('/sw.js').then(reg=>{
    _swRegistration = reg;

    // Si hay un SW esperando al abrir la app (update detectada antes del boot)
    if(reg.waiting) _showUpdateBanner(reg.waiting);

    // SW nuevo encontrado mientras la app está abierta
    reg.addEventListener('updatefound',()=>{
      const sw = reg.installing;
      sw.addEventListener('statechange',()=>{
        // "installed" + hay un controller previo = nueva versión lista para activar
        if(sw.state==='installed' && navigator.serviceWorker.controller){
          _showUpdateBanner(sw);
        }
      });
    });

    // Chequear si hay update disponible en este momento (útil al volver a la app)
    reg.update().catch(()=>{});

  }).catch(err=>console.warn('[SW] Registro fallido:',err));

  // Cuando el nuevo SW toma control → recargamos para aplicar los cambios
  let refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(!refreshing){refreshing=true;window.location.reload();}
  });
}

function _showUpdateBanner(worker){
  const banner=document.getElementById('updateBanner');
  if(!banner) return;
  banner.classList.remove('hidden');
  document.getElementById('btnUpdateNow').onclick=()=>{
    document.getElementById('updateBannerText').textContent='Actualizando…';
    document.getElementById('btnUpdateNow').disabled=true;
    worker.postMessage('skipWaiting');
  };
}

function checkForUpdates(){
  if(!('serviceWorker' in navigator)){showToast('Tu navegador no soporta actualizaciones automáticas');return;}
  showToast('Buscando actualizaciones…',1500);
  navigator.serviceWorker.ready.then(reg=>{
    reg.update().then(()=>{
      if(reg.waiting){
        _showUpdateBanner(reg.waiting);
      }else{
        setTimeout(()=>showToast('✓ Ya tenés la última versión ('+APP_VERSION+')'),1600);
      }
    }).catch(()=>showToast('No se pudo verificar. Revisá tu conexión.'));
  });
}

function forceReload(){
  if(_swRegistration?.waiting){
    _swRegistration.waiting.postMessage('skipWaiting');
  }else{
    window.location.reload(true);
  }
}

// ------- BOOT -------
async function boot(){
  loadSettings();
  if(!initSupabase()){
    // No debería ocurrir con credenciales hardcodeadas, pero por seguridad:
    showAuthScreen();return;
  }
  // Mostrar auth screen mientras Supabase resuelve la sesión
  showAuthScreen();
  // Usamos SOLO onAuthStateChange — dispara INITIAL_SESSION al arrancar
  // con la sesión vigente (si la hay), sin necesidad de llamar getSession() aparte.
  // Esto evita que onSession() se ejecute dos veces.
  state.supabase.auth.onAuthStateChange(async(event,session)=>{
    if(session){
      await onSession(session);
    }else if(event==='SIGNED_OUT'){
      // Solo limpiar estado si el usuario cerró sesión activamente
      onSignOut();
    }
    // INITIAL_SESSION sin sesión → no hacer nada, ya está en auth screen
  });
}

registerSW(); // Registrar SW independiente del flujo de auth
boot();
