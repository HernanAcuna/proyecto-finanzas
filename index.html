<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Finanzas Personales</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          bg:'#0b0f14', surface:'#141a22', card:'#1b232d', line:'#253142',
          text:'#e6edf3', muted:'#8b97a8', brand:'#4f8cff', income:'#22c55e', expense:'#ef4444',
        }
      }
    }
  }
</script>
<style>
  html,body{background:#0b0f14;color:#e6edf3;height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;-webkit-tap-highlight-color:transparent;}
  .tab-active{background:#1b232d;color:#e6edf3;}.tab-inactive{color:#8b97a8;}
  .keypad-btn{user-select:none;transition:transform .05s ease,background .15s ease;}
  .keypad-btn:active{transform:scale(0.96);background:#253142;}
  .cat-chip{transition:all .15s ease;}
  .cat-chip.selected{outline:2px solid #4f8cff;outline-offset:2px;transform:translateY(-1px);}
  .modal-backdrop{background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);}
  input,select,textarea{background:#1b232d;color:#e6edf3;border:1px solid #253142;border-radius:8px;padding:8px 10px;outline:none;}
  input:focus,select:focus,textarea:focus{border-color:#4f8cff;}
  ::-webkit-scrollbar{width:8px;height:8px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#253142;border-radius:4px;}
  .fade-in{animation:fi .2s ease;}
  @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .skeleton{background:linear-gradient(90deg,#1b232d 0%,#253142 50%,#1b232d 100%);background-size:200% 100%;animation:sk 1.2s infinite;}
  @keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}

  /* Category card menu */
  .cat-card{position:relative;border-radius:12px;background:#1b232d;border:1px solid #253142;overflow:visible;}
  .cat-menu-btn{position:absolute;top:6px;right:6px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:7px;color:#8b97a8;transition:background .15s,color .15s;}
  .cat-menu-btn:hover{background:#253142;color:#e6edf3;}
  .cat-dropdown{position:absolute;top:34px;right:0;z-index:50;background:#141a22;border:1px solid #253142;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.5);min-width:140px;overflow:hidden;animation:fi .12s ease;}
  .cat-dropdown.hidden{display:none;}
  .cat-drop-item{display:flex;align-items:center;gap:8px;width:100%;text-align:left;padding:11px 14px;font-size:14px;transition:background .12s;}
  .cat-drop-item:hover{background:#1b232d;}
  .cat-drop-item.danger{color:#ef4444;}
  .cat-drop-item.disabled{color:#8b97a8;opacity:.5;cursor:not-allowed;}
  .cat-drop-divider{height:1px;background:#253142;}

  /* Control tab */
  .ctrl-section{border-radius:16px;background:#1b232d;border:1px solid #253142;overflow:hidden;}
  .ctrl-sec-header{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 16px;transition:background .15s;}
  .ctrl-sec-header:hover{background:rgba(37,49,66,.5);}
  .ctrl-sec-body{border-top:1px solid #253142;}
  .ctrl-item{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid #253142;transition:background .12s;}
  .ctrl-item:last-child{border-bottom:none;}
  .ctrl-item:hover{background:rgba(37,49,66,.3);}
  .ctrl-badge{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:999px;font-weight:500;}
  .badge-pending{background:rgba(234,179,8,.12);color:#eab308;}
  .badge-partial{background:rgba(79,140,255,.12);color:#4f8cff;}
  .badge-paid,.badge-collected{background:rgba(34,197,94,.12);color:#22c55e;}
  .ctrl-prog-track{height:5px;border-radius:99px;background:#253142;overflow:hidden;margin-top:5px;}
  .ctrl-prog-fill{height:100%;border-radius:99px;transition:width .3s;}
  .ctrl-iconbtn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:8px;color:#8b97a8;transition:background .12s,color .12s;flex-shrink:0;}
  .ctrl-iconbtn:hover{background:#253142;color:#e6edf3;}
  .ctrl-iconbtn.del:hover{color:#ef4444;}

  /* Selector sheet */
  .sel-opt{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 8px;border-radius:14px;background:#1b232d;border:1px solid #253142;font-size:13px;font-weight:500;transition:border-color .15s,background .15s;}
  .sel-opt:hover{border-color:#4f8cff;background:#253142;}
  .sel-opt-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;}

  /* Toggle paid button */
  .toggle-paid{width:34px;height:34px;border-radius:50%;border:2px solid #253142;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
  .toggle-paid.paid{background:rgba(34,197,94,.15);border-color:#22c55e;}

  /* Bottom sheet modal on mobile */
  @media(max-width:639px){
    .sheet-wrap{align-items:flex-end!important;}
    .sheet-inner{border-radius:20px 20px 0 0!important;max-height:92vh!important;}
  }

  /* Responsive grid */
  @media(min-width:640px){
    .ctrl-grid-4{grid-template-columns:repeat(4,1fr)!important;}
    .ctrl-2col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .ctrl-2col>.ctrl-section{margin-bottom:0;}
  }
</style>
</head>
<body class="dark">

<div id="app" class="min-h-screen flex flex-col">
  <header class="px-4 pt-4 pb-2 flex items-center justify-between">
    <div>
      <div class="text-muted text-xs uppercase tracking-widest">Balance actual</div>
      <div id="headerBalance" class="text-3xl font-semibold">$0,00</div>
    </div>
    <div class="flex items-center gap-2">
      <button id="btnSyncHeader" title="Sincronizar" class="p-2 rounded-lg bg-card hover:bg-line">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
      </button>
      <span id="syncStatus" class="text-xs text-muted">local</span>
    </div>
  </header>

  <main id="pageContent" class="flex-1 overflow-y-auto px-4 pb-28"></main>

  <nav class="fixed bottom-0 left-0 right-0 bg-surface/90 backdrop-blur border-t border-line flex justify-around items-center py-1 z-20">
    <button data-tab="home" class="tab-btn flex flex-col items-center gap-0.5 px-2 py-1 rounded-lg text-[10px]">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
      Inicio
    </button>
    <button data-tab="dashboard" class="tab-btn flex flex-col items-center gap-0.5 px-2 py-1 rounded-lg text-[10px]">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 15l4-4 3 3 5-6"/></svg>
      Dashboard
    </button>
    <button data-tab="control" class="tab-btn flex flex-col items-center gap-0.5 px-2 py-1 rounded-lg text-[10px]">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="15" x2="12" y2="15"/></svg>
      Control
    </button>
    <button data-tab="categories" class="tab-btn flex flex-col items-center gap-0.5 px-2 py-1 rounded-lg text-[10px]">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Categorías
    </button>
    <button data-tab="settings" class="tab-btn flex flex-col items-center gap-0.5 px-2 py-1 rounded-lg text-[10px]">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
      Ajustes
    </button>
  </nav>
</div>

<!-- Transaction modal -->
<div id="txModal" class="hidden fixed inset-0 z-30 modal-backdrop items-center justify-center">
  <div class="bg-surface w-full max-w-md rounded-2xl border border-line fade-in mx-4 overflow-hidden">
    <div class="flex items-center justify-between p-4 border-b border-line">
      <h3 id="txTitle" class="text-lg font-semibold">Nuevo movimiento</h3>
      <button id="txClose" class="p-2 rounded-lg hover:bg-card"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="p-4 space-y-4">
      <div id="txAmountDisplay" class="text-center text-4xl font-semibold py-3 rounded-xl bg-card">$0</div>
      <div class="grid grid-cols-3 gap-2">
        <button class="keypad-btn bg-card py-4 text-xl rounded-xl" data-key="1">1</button>
        <button class="keypad-btn bg-card py-4 text-xl rounded-xl" data-key="2">2</button>
        <button class="keypad-btn bg-card py-4 text-xl rounded-xl" data-key="3">3</button>
        <button class="keypad-btn bg-card py-4 text-xl rounded-xl" data-key="4">4</button>
        <button class="keypad-btn bg-card py-4 text-xl rounded-xl" data-key="5">5</button>
        <button class="keypad-btn bg-card py-4 text-xl rounded-xl" data-key="6">6</button>
        <button class="keypad-btn bg-card py-4 text-xl rounded-xl" data-key="7">7</button>
        <button class="keypad-btn bg-card py-4 text-xl rounded-xl" data-key="8">8</button>
        <button class="keypad-btn bg-card py-4 text-xl rounded-xl" data-key="9">9</button>
        <button class="keypad-btn bg-card py-4 text-xl rounded-xl" data-key=",">,</button>
        <button class="keypad-btn bg-card py-4 text-xl rounded-xl" data-key="0">0</button>
        <button class="keypad-btn bg-card py-4 text-xl rounded-xl" data-key="back">⌫</button>
      </div>
      <div>
        <div class="text-xs text-muted uppercase tracking-wider mb-2">Categoría</div>
        <div id="txCategories" class="grid grid-cols-4 gap-2 max-h-40 overflow-y-auto"></div>
      </div>
      <div class="grid grid-cols-2 gap-2">
        <label class="text-sm"><span class="block text-xs text-muted mb-1">Fecha</span><input id="txDate" type="date" class="w-full" /></label>
        <label class="text-sm"><span class="block text-xs text-muted mb-1">Nota (opcional)</span><input id="txNote" type="text" class="w-full" placeholder="Ej: supermercado" /></label>
      </div>
    </div>
    <div class="p-4 border-t border-line flex gap-2">
      <button id="txCancel" class="flex-1 py-3 rounded-xl bg-card">Cancelar</button>
      <button id="txSave" class="flex-1 py-3 rounded-xl bg-brand font-semibold">Guardar</button>
    </div>
  </div>
</div>

<!-- Category modal -->
<div id="catModal" class="hidden fixed inset-0 z-30 modal-backdrop items-center justify-center">
  <div class="bg-surface w-full max-w-md rounded-2xl border border-line fade-in mx-4">
    <div class="flex items-center justify-between p-4 border-b border-line">
      <h3 id="catTitle" class="text-lg font-semibold">Nueva categoría</h3>
      <button id="catClose" class="p-2 rounded-lg hover:bg-card"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="p-4 space-y-3">
      <label class="block text-sm"><span class="block text-xs text-muted mb-1">Nombre</span><input id="catName" type="text" class="w-full" placeholder="Ej: Transporte" /></label>
      <label class="block text-sm"><span class="block text-xs text-muted mb-1">Tipo</span><select id="catType" class="w-full"><option value="expense">Egreso</option><option value="income">Ingreso</option></select></label>
      <label class="block text-sm"><span class="block text-xs text-muted mb-1">Ícono (emoji)</span><input id="catIcon" type="text" class="w-full" maxlength="4" placeholder="🛒" /></label>
      <label class="block text-sm"><span class="block text-xs text-muted mb-1">Color</span><input id="catColor" type="color" class="w-full h-10 p-1" value="#4f8cff" /></label>
    </div>
    <div class="p-4 border-t border-line flex gap-2">
      <button id="catCancel" class="flex-1 py-3 rounded-xl bg-card">Cancelar</button>
      <button id="catSave" class="flex-1 py-3 rounded-xl bg-brand font-semibold">Guardar</button>
    </div>
  </div>
</div>

<!-- Confirm modal -->
<div id="confirmModal" class="hidden fixed inset-0 z-40 modal-backdrop items-center justify-center">
  <div class="bg-surface w-full max-w-xs rounded-2xl border border-line fade-in mx-4 overflow-hidden">
    <div class="p-5 space-y-2">
      <h3 id="confirmTitle" class="font-semibold text-base">Eliminar</h3>
      <p id="confirmMsg" class="text-sm text-muted leading-relaxed"></p>
    </div>
    <div class="flex border-t border-line">
      <button id="confirmCancel" class="flex-1 py-3 text-sm rounded-bl-2xl hover:bg-card transition-colors">Cancelar</button>
      <div class="w-px bg-line"></div>
      <button id="confirmOk" class="flex-1 py-3 text-sm text-expense font-semibold rounded-br-2xl hover:bg-expense/10 transition-colors">Eliminar</button>
    </div>
  </div>
</div>

<!-- ===== CONTROL MODALS ===== -->

<!-- Type selector sheet -->
<div id="selectorSheet" class="hidden fixed inset-0 z-30 modal-backdrop sheet-wrap flex items-end sm:items-center justify-center">
  <div class="sheet-inner bg-surface w-full sm:max-w-sm rounded-t-2xl sm:rounded-2xl border border-line fade-in">
    <div class="w-10 h-1 bg-line rounded-full mx-auto mt-3 mb-1 sm:hidden"></div>
    <div class="px-4 py-3 border-b border-line flex items-center justify-between">
      <h3 class="font-semibold">¿Qué querés agregar?</h3>
      <button id="selectorClose" class="p-1.5 rounded-lg hover:bg-card"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="p-4 grid grid-cols-2 gap-3">
      <button class="sel-opt" data-type="fixed"><span class="sel-opt-icon" style="background:#f59e0b22;">🔁</span>Gasto fijo</button>
      <button class="sel-opt" data-type="variable"><span class="sel-opt-icon" style="background:#4f8cff22;">📊</span>Presupuesto variable</button>
      <button class="sel-opt" data-type="debt"><span class="sel-opt-icon" style="background:#ef444422;">💳</span>Deuda</button>
      <button class="sel-opt" data-type="receivable"><span class="sel-opt-icon" style="background:#22c55e22;">🤝</span>Por cobrar</button>
    </div>
    <div class="px-4 pb-4 sm:pb-4"><button id="selectorCancelBtn" class="w-full py-3 rounded-xl bg-card text-sm">Cancelar</button></div>
  </div>
</div>

<!-- Fixed cost modal -->
<div id="fixedModal" class="hidden fixed inset-0 z-30 modal-backdrop items-center justify-center">
  <div class="bg-surface w-full max-w-md rounded-2xl border border-line fade-in mx-4 max-h-[92vh] flex flex-col">
    <div class="flex items-center justify-between p-4 border-b border-line flex-shrink-0">
      <h3 id="fixedModalTitle" class="text-lg font-semibold">Nuevo gasto fijo</h3>
      <button id="fixedModalClose" class="p-2 rounded-lg hover:bg-card"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="p-4 space-y-3 overflow-y-auto flex-1">
      <label class="block text-sm"><span class="block text-xs text-muted mb-1">Nombre</span><input id="fcName" type="text" class="w-full" placeholder="Ej: Alquiler" /></label>
      <label class="block text-sm"><span class="block text-xs text-muted mb-1">Monto</span><input id="fcAmount" type="number" min="0" class="w-full" placeholder="0" /></label>
      <label class="block text-sm"><span class="block text-xs text-muted mb-1">Día de vencimiento (1–31)</span><input id="fcDueDay" type="number" min="1" max="31" class="w-full" placeholder="10" /></label>
      <label class="block text-sm"><span class="block text-xs text-muted mb-1">Ícono (emoji)</span><input id="fcIcon" type="text" maxlength="4" class="w-full" placeholder="🏠" /></label>
      <label class="flex items-center gap-3 text-sm cursor-pointer select-none">
        <input id="fcActive" type="checkbox" checked class="w-4 h-4 accent-brand" />
        <span>Activo (se genera cada mes)</span>
      </label>
    </div>
    <div class="p-4 border-t border-line flex gap-2 flex-shrink-0">
      <button id="fixedModalCancel" class="flex-1 py-3 rounded-xl bg-card">Cancelar</button>
      <button id="fixedModalSave" class="flex-1 py-3 rounded-xl bg-brand font-semibold">Guardar</button>
    </div>
  </div>
</div>

<!-- Variable budget modal -->
<div id="variableModal" class="hidden fixed inset-0 z-30 modal-backdrop items-center justify-center">
  <div class="bg-surface w-full max-w-md rounded-2xl border border-line fade-in mx-4 max-h-[92vh] flex flex-col">
    <div class="flex items-center justify-between p-4 border-b border-line flex-shrink-0">
      <h3 id="variableModalTitle" class="text-lg font-semibold">Nuevo presupuesto</h3>
      <button id="variableModalClose" class="p-2 rounded-lg hover:bg-card"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="p-4 space-y-3 overflow-y-auto flex-1">
      <label class="block text-sm"><span class="block text-xs text-muted mb-1">Categoría</span><select id="vbCategory" class="w-full"></select></label>
      <label class="block text-sm"><span class="block text-xs text-muted mb-1">Monto presupuestado</span><input id="vbAmount" type="number" min="0" class="w-full" placeholder="0" /></label>
      <div class="text-xs text-muted rounded-lg bg-card border border-line p-3">El presupuesto se aplicará para <strong id="vbMonthLabel" class="text-text"></strong>.</div>
    </div>
    <div class="p-4 border-t border-line flex gap-2 flex-shrink-0">
      <button id="variableModalCancel" class="flex-1 py-3 rounded-xl bg-card">Cancelar</button>
      <button id="variableModalSave" class="flex-1 py-3 rounded-xl bg-brand font-semibold">Guardar</button>
    </div>
  </div>
</div>

<!-- Debt modal -->
<div id="debtModal" class="hidden fixed inset-0 z-30 modal-backdrop items-center justify-center">
  <div class="bg-surface w-full max-w-md rounded-2xl border border-line fade-in mx-4 max-h-[92vh] flex flex-col">
    <div class="flex items-center justify-between p-4 border-b border-line flex-shrink-0">
      <h3 id="debtModalTitle" class="text-lg font-semibold">Nueva deuda</h3>
      <button id="debtModalClose" class="p-2 rounded-lg hover:bg-card"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="p-4 space-y-3 overflow-y-auto flex-1">
      <label class="block text-sm"><span class="block text-xs text-muted mb-1">Persona / Entidad</span><input id="dbName" type="text" class="w-full" placeholder="Ej: Banco Galicia" /></label>
      <label class="block text-sm"><span class="block text-xs text-muted mb-1">Concepto</span><input id="dbConcept" type="text" class="w-full" placeholder="Ej: Préstamo personal" /></label>
      <div class="grid grid-cols-2 gap-2">

        <select id="rcvStatus" class="w-full">

          <option value="partial">Parcial</option>
          <option value="collected">Cobrado</option>

<!-- Toast -->
<div id="toast" class="hidden fixed bottom-24 left-1/2 -translate-x-1/2 bg-card border border-line rounded-lg px-4 py-2 text-sm z-40 whitespace-nowrap"></div>

<script>
/* =========================================================================
   FINANZAS PERSONALES
   ========================================================================= */

// ------- CONFIG -------
const STORAGE_KEYS = {
  txs:'fin_transactions', cats:'fin_categories', settings:'fin_settings',
  fc:'fin_fixed_costs', fr:'fin_fixed_records', vb:'fin_var_budgets',
  debts:'fin_debts', recv:'fin_receivables',
};
const SYSTEM_CATEGORY_NAMES = ['Otros Ing.', 'Otros Eg.'];

const DEFAULT_CATEGORIES = [
  {name:'Sueldo',type:'income',icon:'💼',color:'#22c55e'},
  {name:'Bonos',type:'income',icon:'🎁',color:'#16a34a'},
  {name:'Inversiones',type:'income',icon:'📈',color:'#10b981'},
  {name:'Otros Ing.',type:'income',icon:'💰',color:'#14b8a6'},
  {name:'Comida',type:'expense',icon:'🍔',color:'#ef4444'},
  {name:'Transporte',type:'expense',icon:'🚗',color:'#f97316'},
  {name:'Hogar',type:'expense',icon:'🏠',color:'#eab308'},
  {name:'Salud',type:'expense',icon:'🏥',color:'#ec4899'},
  {name:'Ocio',type:'expense',icon:'🎮',color:'#8b5cf6'},
  {name:'Educación',type:'expense',icon:'📚',color:'#3b82f6'},
  {name:'Ropa',type:'expense',icon:'👕',color:'#06b6d4'},
  {name:'Servicios',type:'expense',icon:'💡',color:'#f59e0b'},
  {name:'Otros Eg.',type:'expense',icon:'🧾',color:'#64748b'},
];

// ------- STATE -------
const state = {
  tab:'home', transactions:[], categories:[], settings:{currency:'ARS',currencySymbol:'$',supabaseUrl:'',supabaseKey:''},
  supabase:null, txModalOpen:false, txType:'expense', txAmountRaw:'', txCategoryId:null,
  dashMonth:currentMonthKey(), chart:null,
  // Control
  fixedCosts:[], fixedCostRecords:[], variableBudgets:[], debts:[], receivables:[],
  controlMonth:currentMonthKey(),
  ctrlSections:{fixed:true,variable:true,debt:true,recv:true},
};

// ------- UTIL -------
function currentMonthKey(d=new Date()){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function todayIso(){const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,10);}
function uid(){return 'x-'+Math.random().toString(36).slice(2,10)+Date.now().toString(36);}
function fmtMoney(n,withSign=false){
  const abs=Math.abs(n);
  const s=new Intl.NumberFormat('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}).format(abs);
  const sign=withSign?(n<0?'-':(n>0?'+':'')):(n<0?'-':'');
  return `${sign}${state.settings.currencySymbol}${s}`;
}
function parseAmount(raw){if(!raw)return 0;const n=parseFloat(raw.replace(',','.'));return isNaN(n)?0:n;}
function showToast(msg,ms=2400){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.remove('hidden');
  clearTimeout(showToast._t);showToast._t=setTimeout(()=>t.classList.add('hidden'),ms);
}
function isSystemCategory(cat){return SYSTEM_CATEGORY_NAMES.includes(cat.name);}
function formatMonthLabel(key){
  const[y,m]=key.split('-').map(Number);
  return new Date(y,m-1,1).toLocaleDateString('es-AR',{month:'long',year:'numeric'});
}

// ------- LOCAL STORAGE -------
function loadLocal(){
  const parse=(k,def)=>{try{return JSON.parse(localStorage.getItem(k)||'null')||def;}catch{return def;}};
  state.transactions=parse(STORAGE_KEYS.txs,[]);
  state.categories=parse(STORAGE_KEYS.cats,null);
  state.settings=Object.assign(state.settings,parse(STORAGE_KEYS.settings,{}));
  if(!state.categories){state.categories=DEFAULT_CATEGORIES.map(c=>({...c,id:uid()}));saveLocalCats();}
  // Control data
  state.fixedCosts=parse(STORAGE_KEYS.fc,[]);
  state.fixedCostRecords=parse(STORAGE_KEYS.fr,[]);
  state.variableBudgets=parse(STORAGE_KEYS.vb,[]);
  state.debts=parse(STORAGE_KEYS.debts,[]);
  state.receivables=parse(STORAGE_KEYS.recv,[]);
}
const saveLocalTxs=()=>localStorage.setItem(STORAGE_KEYS.txs,JSON.stringify(state.transactions));
const saveLocalCats=()=>localStorage.setItem(STORAGE_KEYS.cats,JSON.stringify(state.categories));
const saveLocalSettings=()=>localStorage.setItem(STORAGE_KEYS.settings,JSON.stringify(state.settings));
const saveFC=()=>localStorage.setItem(STORAGE_KEYS.fc,JSON.stringify(state.fixedCosts));
const saveFR=()=>localStorage.setItem(STORAGE_KEYS.fr,JSON.stringify(state.fixedCostRecords));
const saveVB=()=>localStorage.setItem(STORAGE_KEYS.vb,JSON.stringify(state.variableBudgets));
const saveDB=()=>localStorage.setItem(STORAGE_KEYS.debts,JSON.stringify(state.debts));
const saveRCV=()=>localStorage.setItem(STORAGE_KEYS.recv,JSON.stringify(state.receivables));

// ------- SUPABASE -------
function initSupabase(){
  const{supabaseUrl,supabaseKey}=state.settings;
  if(supabaseUrl&&supabaseKey&&window.supabase){
    try{state.supabase=window.supabase.createClient(supabaseUrl,supabaseKey);setSyncStatus('conectando…');return true;}
    catch(e){state.supabase=null;}
  }else{state.supabase=null;}return false;
}
function setSyncStatus(text){document.getElementById('syncStatus').textContent=text;}
async function syncFromSupabase(){
  if(!state.supabase){setSyncStatus('local');return;}
  try{
    setSyncStatus('sincronizando…');
    const[{data:cats,error:e1},{data:txs,error:e2}]=await Promise.all([
      state.supabase.from('categories').select('*').order('type').order('name'),
      state.supabase.from('transactions').select('*').order('date',{ascending:false}),
    ]);
    if(e1||e2)throw(e1||e2);
    if(cats&&cats.length>0){state.categories=cats.map(c=>({id:c.id,name:c.name,type:c.type,icon:c.icon||'💠',color:c.color||'#4f8cff'}));saveLocalCats();}
    else if(cats&&cats.length===0)await pushDefaultCategories();
    if(txs){state.transactions=txs.map(t=>({id:t.id,amount:Number(t.amount),type:t.type,category_id:t.category_id,date:t.date,note:t.note||'',created_at:t.created_at}));saveLocalTxs();}
    setSyncStatus('✓ sincronizado');renderCurrentTab();
  }catch(err){console.error(err);setSyncStatus('error sync');showToast('Error sincronizando: '+(err.message||err));}
}
async function pushDefaultCategories(){
  if(!state.supabase)return;
  const rows=DEFAULT_CATEGORIES.map(c=>({name:c.name,type:c.type,icon:c.icon,color:c.color}));
  const{data,error}=await state.supabase.from('categories').insert(rows).select();
  if(error)throw error;
  state.categories=data.map(c=>({id:c.id,name:c.name,type:c.type,icon:c.icon,color:c.color}));saveLocalCats();
}
async function remoteInsertTx(tx){if(!state.supabase)return;const{error}=await state.supabase.from('transactions').insert({id:tx.id,amount:tx.amount,type:tx.type,category_id:tx.category_id,date:tx.date,note:tx.note});if(error)throw error;}
async function remoteDeleteTx(id){if(!state.supabase)return;const{error}=await state.supabase.from('transactions').delete().eq('id',id);if(error)throw error;}
async function remoteUpsertCat(cat){if(!state.supabase)return;const{error}=await state.supabase.from('categories').upsert({id:cat.id,name:cat.name,type:cat.type,icon:cat.icon,color:cat.color});if(error)throw error;}
async function remoteDeleteCat(id){if(!state.supabase)return;const{error}=await state.supabase.from('categories').delete().eq('id',id);if(error)throw error;}
async function remoteMigrateCatTxs(fromId,toId){if(!state.supabase)return;const{error}=await state.supabase.from('transactions').update({category_id:toId}).eq('category_id',fromId);if(error)throw error;}

// ------- CONTROL: MONTHLY RECURRENCE -------
function ensureFixedRecords(monthKey){
  const existingIds=new Set(state.fixedCostRecords.filter(r=>r.month===monthKey).map(r=>r.fixedCostId));
  let changed=false;
  for(const fc of state.fixedCosts){
    if(!fc.active||existingIds.has(fc.id))continue;
    const createdMonth=(fc.createdAt||'').slice(0,7);
    if(createdMonth&&monthKey<createdMonth)continue;
    state.fixedCostRecords.push({id:uid(),fixedCostId:fc.id,month:monthKey,amount:fc.amount,status:'pending',paidAt:null});
    changed=true;
  }
  if(changed)saveFR();
}

// ------- HELPERS -------
function getCategory(id){return state.categories.find(c=>c.id===id);}
function getActualSpending(categoryId,monthKey){
  return state.transactions.filter(t=>t.category_id===categoryId&&t.type==='expense'&&(t.date||'').slice(0,7)===monthKey).reduce((s,t)=>s+t.amount,0);
}
function totalsAll(){let i=0,e=0;for(const t of state.transactions){if(t.type==='income')i+=t.amount;else if(t.type==='expense')e+=t.amount;}return{income:i,expense:e,balance:i-e};}
function totalsByMonth(mk){
  let i=0,e=0;const byCat={};
  for(const t of state.transactions){
    if((t.date||'').slice(0,7)!==mk)continue;
    if(t.type==='income')i+=t.amount;else e+=t.amount;
    if(t.type==='expense')byCat[t.category_id]=(byCat[t.category_id]||0)+t.amount;
  }
  return{income:i,expense:e,balance:i-e,byCat};
}
function debtTypeLabel(t){return{loan:'Préstamo',card:'Tarjeta',current_account:'Cta. cte.',other:'Otro'}[t]||t;}
function rcvTypeLabel(t){return{loan:'Préstamo',current_account:'Cta. cte.',sale:'Venta',other:'Otro'}[t]||t;}
function statusLabel(s){return{pending:'Pendiente',partial:'Parcial',paid:'Saldado',collected:'Cobrado'}[s]||s;}
function statusClass(s){return{pending:'badge-pending',partial:'badge-partial',paid:'badge-paid',collected:'badge-collected'}[s]||'badge-pending';}

// ------- RENDER HEADER -------
function renderHeader(){
  const{balance}=totalsAll();
  const el=document.getElementById('headerBalance');
  el.textContent=fmtMoney(balance);
  el.className='text-3xl font-semibold '+(balance<0?'text-expense':'text-text');
}

// ------- TABS -------
function setTab(tab){
  state.tab=tab;closeCatMenus();
  document.querySelectorAll('.tab-btn').forEach(b=>{const a=b.dataset.tab===tab;b.classList.toggle('tab-active',a);b.classList.toggle('tab-inactive',!a);});
  renderCurrentTab();
}
function renderCurrentTab(){
  renderHeader();
  const page=document.getElementById('pageContent');page.innerHTML='';
  if(state.tab==='home')page.appendChild(viewHome());
  if(state.tab==='dashboard')page.appendChild(viewDashboard());
  if(state.tab==='control')page.appendChild(viewControl());
  if(state.tab==='categories')page.appendChild(viewCategories());
  if(state.tab==='settings')page.appendChild(viewSettings());
}

// ------- VIEW: HOME -------
function viewHome(){
  const root=document.createElement('div');root.className='fade-in space-y-4';
  const mk=currentMonthKey();const{income,expense,balance}=totalsByMonth(mk);
  root.innerHTML=`
    <div class="grid grid-cols-2 gap-3 mt-2">
      <button id="qaIncome" class="rounded-2xl bg-income/15 border border-income/40 text-income py-6 font-semibold text-lg flex flex-col items-center gap-1">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></svg>+ INGRESO</button>
      <button id="qaExpense" class="rounded-2xl bg-expense/15 border border-expense/40 text-expense py-6 font-semibold text-lg flex flex-col items-center gap-1">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12l7 7 7-7"/></svg>− EGRESO</button>
    </div>
    <div class="rounded-2xl bg-card border border-line p-4">
      <div class="flex items-center justify-between mb-3"><div class="text-sm text-muted uppercase tracking-wider">Este mes</div><div class="text-xs text-muted">${formatMonthLabel(mk)}</div></div>
      <div class="grid grid-cols-3 gap-2 text-center">
        <div><div class="text-xs text-muted">Ingresos</div><div class="text-income font-semibold">${fmtMoney(income)}</div></div>
        <div><div class="text-xs text-muted">Egresos</div><div class="text-expense font-semibold">${fmtMoney(expense)}</div></div>
        <div><div class="text-xs text-muted">Balance</div><div class="font-semibold ${balance<0?'text-expense':'text-income'}">${fmtMoney(balance)}</div></div>
      </div>
    </div>
    <div>
      <div class="flex items-center justify-between mb-2"><h2 class="font-semibold">Últimos movimientos</h2><span class="text-xs text-muted">${state.transactions.length} total</span></div>
      <div id="recentList" class="space-y-2"></div>
    </div>`;
  const list=root.querySelector('#recentList');
  const recent=[...state.transactions].sort((a,b)=>(b.date+(b.created_at||'')).localeCompare(a.date+(a.created_at||''))).slice(0,12);
  if(!recent.length)list.innerHTML=`<div class="text-center text-muted py-8">Sin movimientos aún.</div>`;
  else for(const tx of recent)list.appendChild(renderTxRow(tx));
  root.querySelector('#qaIncome').onclick=()=>openTxModal('income');
  root.querySelector('#qaExpense').onclick=()=>openTxModal('expense');
  return root;
}
function renderTxRow(tx){
  const cat=getCategory(tx.category_id)||{name:'—',icon:'•',color:'#8b97a8'};
  const row=document.createElement('div');row.className='flex items-center gap-3 bg-card border border-line rounded-xl p-3';
  row.innerHTML=`
    <div class="w-10 h-10 rounded-full flex items-center justify-center text-lg" style="background:${cat.color}22;border:1px solid ${cat.color}66;">${cat.icon||'•'}</div>
    <div class="flex-1 min-w-0">
      <div class="flex items-center gap-2"><span class="font-medium truncate">${cat.name}</span><span class="text-xs text-muted">${tx.date}</span></div>
      <div class="text-xs text-muted truncate">${tx.note||'—'}</div>
    </div>
    <div class="text-right">
      <div class="font-semibold ${tx.type==='income'?'text-income':'text-expense'}">${tx.type==='income'?'+':'−'}${fmtMoney(tx.amount)}</div>
      <button class="text-xs text-muted hover:text-expense mt-1" data-del="${tx.id}">Eliminar</button>
    </div>`;
  row.querySelector('[data-del]').onclick=async()=>{if(!confirm('¿Eliminar este movimiento?'))return;await deleteTransaction(tx.id);};
  return row;
}

// ------- VIEW: DASHBOARD -------
function viewDashboard(){
  const root=document.createElement('div');root.className='fade-in space-y-4';
  const mk=state.dashMonth;const{income,expense,balance,byCat}=totalsByMonth(mk);
  root.innerHTML=`
    <div class="flex items-center justify-between"><h2 class="font-semibold text-lg">Dashboard</h2><input id="dashMonth" type="month" value="${mk}" /></div>
    <div class="grid grid-cols-3 gap-2">
      <div class="rounded-xl bg-card border border-line p-3"><div class="text-xs text-muted">Ingresos</div><div class="text-income font-semibold text-lg">${fmtMoney(income)}</div></div>
      <div class="rounded-xl bg-card border border-line p-3"><div class="text-xs text-muted">Egresos</div><div class="text-expense font-semibold text-lg">${fmtMoney(expense)}</div></div>
      <div class="rounded-xl bg-card border border-line p-3"><div class="text-xs text-muted">Balance</div><div class="font-semibold text-lg ${balance<0?'text-expense':'text-income'}">${fmtMoney(balance)}</div></div>
    </div>
    <div class="rounded-2xl bg-card border border-line p-4">
      <h3 class="font-semibold mb-2">Egresos por categoría</h3>
      <div class="relative" style="height:260px;"><canvas id="pieChart"></canvas></div>
      <div id="catLegend" class="mt-3 space-y-2"></div>
    </div>
    <div class="rounded-2xl bg-card border border-line p-4">
      <h3 class="font-semibold mb-2">Total histórico</h3>
      <div class="grid grid-cols-3 gap-2 text-center">
        <div><div class="text-xs text-muted">Ingresos</div><div class="text-income font-semibold">${fmtMoney(totalsAll().income)}</div></div>
        <div><div class="text-xs text-muted">Egresos</div><div class="text-expense font-semibold">${fmtMoney(totalsAll().expense)}</div></div>
        <div><div class="text-xs text-muted">Balance</div><div class="font-semibold ${totalsAll().balance<0?'text-expense':'text-income'}">${fmtMoney(totalsAll().balance)}</div></div>
      </div>
    </div>`;
  setTimeout(()=>renderPie(byCat,root.querySelector('#catLegend')),0);
  root.querySelector('#dashMonth').addEventListener('change',e=>{state.dashMonth=e.target.value||currentMonthKey();renderCurrentTab();});
  return root;
}
function renderPie(byCat,legendEl){
  const canvas=document.getElementById('pieChart');if(!canvas)return;
  const entries=Object.entries(byCat).map(([cid,v])=>{const c=getCategory(cid)||{name:'Sin cat.',color:'#8b97a8'};return{name:c.name,color:c.color,value:v};}).sort((a,b)=>b.value-a.value);
  if(state.chart){state.chart.destroy();state.chart=null;}
  if(!entries.length){legendEl.innerHTML='<div class="text-muted text-center text-sm">Sin egresos este mes</div>';return;}
  state.chart=new Chart(canvas.getContext('2d'),{type:'doughnut',data:{labels:entries.map(e=>e.name),datasets:[{data:entries.map(e=>e.value),backgroundColor:entries.map(e=>e.color),borderWidth:2,borderColor:'#141a22'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${fmtMoney(ctx.parsed)}`}}},cutout:'60%'}});
  const total=entries.reduce((s,e)=>s+e.value,0);
  legendEl.innerHTML=entries.map(e=>`<div class="flex items-center justify-between text-sm"><div class="flex items-center gap-2 min-w-0"><span class="w-3 h-3 rounded-sm inline-block" style="background:${e.color}"></span><span class="truncate">${e.name}</span></div><div class="flex items-center gap-3 text-muted"><span>${((e.value/total)*100).toFixed(1)}%</span><span class="text-text font-medium">${fmtMoney(e.value)}</span></div></div>`).join('');
}

// ------- VIEW: CONTROL -------
function viewControl(){
  ensureFixedRecords(state.controlMonth);
  const root=document.createElement('div');root.className='fade-in space-y-4';

  // Header: month nav + add button
  const hdr=document.createElement('div');hdr.className='flex items-center justify-between';
  hdr.innerHTML=`
    <div class="flex items-center gap-1">

function buildControlSummary(){
  const mk=state.controlMonth;
  const records=state.fixedCostRecords.filter(r=>r.month===mk);
  const fixedTotal=records.reduce((s,r)=>s+r.amount,0);
  const fixedPending=records.filter(r=>r.status==='pending').reduce((s,r)=>s+r.amount,0);
  const budgets=state.variableBudgets.filter(b=>b.month===mk);
  const varSpent=budgets.reduce((s,b)=>s+getActualSpending(b.categoryId,mk),0);
  const varBudgeted=budgets.reduce((s,b)=>s+b.budgeted,0);
  const debtPending=state.debts.filter(d=>d.status!=='paid').reduce((s,d)=>s+(d.totalAmount-d.paidAmount),0);
  const recvPending=state.receivables.filter(r=>r.status!=='collected').reduce((s,r)=>s+(r.totalAmount-r.collectedAmount),0);

  const wrap=document.createElement('div');
  wrap.className='grid grid-cols-2 gap-2 ctrl-grid-4';

function buildCtrlSection(key,title,count,openInit,fillBody){

  header.innerHTML=`

  const body=document.createElement('div');body.className=`ctrl-sec-body${open?'':' hidden'}`;

    state.settings.supabaseUrl=root.querySelector('#sbUrl').value.trim();
    state.settings.supabaseKey=root.querySelector('#sbKey').value.trim();
    saveLocalSettings();
    if(initSupabase()){syncFromSupabase();showToast('Conectado. Sincronizando…');}
    else{setSyncStatus('local');showToast('Credenciales vacías — modo local');}
  };
  root.querySelector('#sbSync').onclick=async()=>{if(!state.supabase){showToast('Primero guardá las credenciales');return;}await syncFromSupabase();};
  root.querySelector('#btnExport').onclick=exportJson;
  root.querySelector('#btnImport').onclick=()=>root.querySelector('#fileImport').click();
  root.querySelector('#fileImport').onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=()=>{try{const obj=JSON.parse(r.result);if(obj.categories){state.categories=obj.categories;saveLocalCats();}if(obj.transactions){state.transactions=obj.transactions;saveLocalTxs();}showToast('Datos importados');renderCurrentTab();}catch{showToast('Archivo JSON inválido');}};r.readAsText(f);
  };
  root.querySelector('#btnWipe').onclick=()=>{
    if(!confirm('Borrar datos locales (no toca Supabase). ¿Seguir?'))return;
    [STORAGE_KEYS.txs,STORAGE_KEYS.cats].forEach(k=>localStorage.removeItem(k));
    loadLocal();renderCurrentTab();showToast('Datos locales borrados');
  };
  root.querySelector('#btnCopySQL').onclick=async()=>{await navigator.clipboard.writeText(SQL_SCHEMA);showToast('SQL copiado');};
  return root;
}
function exportJson(){
  const blob=new Blob([JSON.stringify({exportedAt:new Date().toISOString(),categories:state.categories,transactions:state.transactions,fixedCosts:state.fixedCosts,fixedCostRecords:state.fixedCostRecords,variableBudgets:state.variableBudgets,debts:state.debts,receivables:state.receivables},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`finanzas-export-${todayIso()}.json`;a.click();
}

// ------- TX MODAL -------
function openTxModal(type){
  state.txType=type;state.txAmountRaw='';state.txCategoryId=null;
  document.getElementById('txTitle').textContent=type==='income'?'Nuevo Ingreso':'Nuevo Egreso';
  document.getElementById('txDate').value=todayIso();document.getElementById('txNote').value='';
  updateTxAmountDisplay();renderTxCategories();
  const m=document.getElementById('txModal');m.classList.remove('hidden');m.classList.add('flex');state.txModalOpen=true;
}
function closeTxModal(){const m=document.getElementById('txModal');m.classList.add('hidden');m.classList.remove('flex');state.txModalOpen=false;}
function updateTxAmountDisplay(){
  const el=document.getElementById('txAmountDisplay');el.textContent=fmtMoney(parseAmount(state.txAmountRaw));
  el.className='text-center text-4xl font-semibold py-3 rounded-xl bg-card '+(state.txType==='income'?'text-income':'text-expense');
}
function keypadPress(key){
  if(key==='back'){state.txAmountRaw=state.txAmountRaw.slice(0,-1);}
  else if(key===','){if(!state.txAmountRaw.includes(','))state.txAmountRaw=(state.txAmountRaw||'0')+',';}
  else{
    if(state.txAmountRaw.includes(',')){const dec=state.txAmountRaw.split(',')[1]||'';if(dec.length>=2)return;}
    if(state.txAmountRaw==='0')state.txAmountRaw=key;else state.txAmountRaw+=key;
    if(state.txAmountRaw.length>12)state.txAmountRaw=state.txAmountRaw.slice(0,12);
  }
  updateTxAmountDisplay();
}
function renderTxCategories(){
  const wrap=document.getElementById('txCategories');wrap.innerHTML='';
  for(const c of state.categories.filter(c=>c.type===state.txType)){
    const btn=document.createElement('button');btn.className='cat-chip bg-card border border-line rounded-xl p-2 flex flex-col items-center gap-1';
    btn.innerHTML=`<span class="w-9 h-9 rounded-full flex items-center justify-center text-lg" style="background:${c.color}22;border:1px solid ${c.color}66;">${c.icon||'•'}</span><span class="text-xs truncate max-w-full">${c.name}</span>`;
    btn.onclick=()=>{state.txCategoryId=c.id;[...wrap.children].forEach(x=>x.classList.remove('selected'));btn.classList.add('selected');};
    wrap.appendChild(btn);
  }
}
async function saveTransaction(){
  const amount=parseAmount(state.txAmountRaw);
  if(!amount||amount<=0){showToast('Ingresá un monto');return;}
  if(!state.txCategoryId){showToast('Elegí una categoría');return;}
  const tx={id:uid(),amount,type:state.txType,category_id:state.txCategoryId,date:document.getElementById('txDate').value||todayIso(),note:document.getElementById('txNote').value.trim(),created_at:new Date().toISOString()};
  state.transactions.unshift(tx);saveLocalTxs();
  try{await remoteInsertTx(tx);}catch{showToast('Guardado local (sync falló)');}
  closeTxModal();renderCurrentTab();showToast(state.txType==='income'?'Ingreso agregado':'Egreso agregado');
}
async function deleteTransaction(id){state.transactions=state.transactions.filter(t=>t.id!==id);saveLocalTxs();try{await remoteDeleteTx(id);}catch{}renderCurrentTab();}

let catEditing=null;
function openCatModal(cat){
  catEditing=cat||null;
  document.getElementById('catTitle').textContent=cat?'Editar categoría':'Nueva categoría';
  document.getElementById('catName').value=cat?.name||'';
  document.getElementById('catType').value=cat?.type||'expense';
  document.getElementById('catIcon').value=cat?.icon||'💠';
  document.getElementById('catColor').value=cat?.color||'#4f8cff';
  const m=document.getElementById('catModal');m.classList.remove('hidden');m.classList.add('flex');
}
function closeCatModal(){const m=document.getElementById('catModal');m.classList.add('hidden');m.classList.remove('flex');catEditing=null;}
async function saveCategory(){
  const name=document.getElementById('catName').value.trim(),type=document.getElementById('catType').value,icon=document.getElementById('catIcon').value.trim()||'💠',color=document.getElementById('catColor').value;
  if(!name){showToast('Ingresá un nombre');return;}
  if(state.categories.find(c=>c.name.toLowerCase()===name.toLowerCase()&&c.type===type&&c.id!==catEditing?.id)){showToast(`Ya existe "${name}" en ese tipo`);return;}
  if(catEditing){Object.assign(catEditing,{name,type,icon,color});saveLocalCats();try{await remoteUpsertCat(catEditing);}catch{}closeCatModal();renderCurrentTab();showToast('Categoría actualizada');}
  else{const nc={id:uid(),name,type,icon,color};state.categories.push(nc);saveLocalCats();try{await remoteUpsertCat(nc);}catch{}closeCatModal();renderCurrentTab();showToast('Categoría creada');}
}
function confirmDeleteCategory(cat){
  if(isSystemCategory(cat)){showToast('Esta categoría es del sistema y no puede eliminarse');return;}
  const used=state.transactions.filter(t=>t.category_id===cat.id).length;
  const fallbackName=cat.type==='income'?'Otros Ing.':'Otros Eg.';
  const fallback=state.categories.find(c=>c.name===fallbackName&&c.type===cat.type);
  let msg=`¿Eliminar "${cat.name}"?`;
  if(used>0)msg+=fallback?` ${used} movimiento(s) se reasignarán a "${fallbackName}".`:` ${used} movimiento(s) quedarán sin categoría.`;
  showConfirmModal({title:'Eliminar categoría',message:msg,onConfirm:()=>executeCategoryDelete(cat,fallback)});
}
async function executeCategoryDelete(cat,fallback){
  if(fallback){for(const tx of state.transactions)if(tx.category_id===cat.id)tx.category_id=fallback.id;saveLocalTxs();try{await remoteMigrateCatTxs(cat.id,fallback.id);}catch{}}
  state.categories=state.categories.filter(c=>c.id!==cat.id);saveLocalCats();try{await remoteDeleteCat(cat.id);}catch{}
  renderCurrentTab();showToast(fallback?`Categoría eliminada. Movimientos → "${fallback.name}".`:'Categoría eliminada.');
}

let fixedEditing=null;
function openFixedModal(fc=null){
  fixedEditing=fc;
  document.getElementById('fixedModalTitle').textContent=fc?'Editar gasto fijo':'Nuevo gasto fijo';
  document.getElementById('fcName').value=fc?.name||'';
  document.getElementById('fcAmount').value=fc?.amount||'';
  document.getElementById('fcDueDay').value=fc?.dueDay||'';
  document.getElementById('fcIcon').value=fc?.icon||'🔁';
  document.getElementById('fcActive').checked=fc?.active!==false;
  closeItemSelector();
  const m=document.getElementById('fixedModal');m.classList.remove('hidden');m.classList.add('flex');
}
function closeFixedModal(){const m=document.getElementById('fixedModal');m.classList.add('hidden');m.classList.remove('flex');fixedEditing=null;}
function saveFixedCost(){
  const name=document.getElementById('fcName').value.trim();
  const amount=parseFloat(document.getElementById('fcAmount').value)||0;
  const dueDay=parseInt(document.getElementById('fcDueDay').value)||1;
  const icon=document.getElementById('fcIcon').value.trim()||'🔁';
  const active=document.getElementById('fcActive').checked;
  if(!name){showToast('Ingresá un nombre');return;}
  if(amount<=0){showToast('Ingresá un monto válido');return;}
  if(fixedEditing){
    const prev=fixedEditing.amount;
    Object.assign(fixedEditing,{name,amount,dueDay,icon,active});
    saveFC();
    // If amount changed, update records for THIS month onwards (create new ones if amount changed)
    if(prev!==amount){
      const mk=state.controlMonth;
      const rec=state.fixedCostRecords.find(r=>r.fixedCostId===fixedEditing.id&&r.month===mk);
      if(rec&&rec.status==='pending')rec.amount=amount;
      saveFR();
    }
    showToast('Gasto fijo actualizado');
  }else{
    const fc={id:uid(),name,amount,dueDay,icon,active,createdAt:todayIso()};
    state.fixedCosts.push(fc);saveFC();
    // Auto-create record for current control month
    ensureFixedRecords(state.controlMonth);
    showToast('Gasto fijo creado');
  }
  closeFixedModal();renderCurrentTab();
}

let variableEditing=null;
function openVariableModal(vb=null){
  variableEditing=vb;
  document.getElementById('variableModalTitle').textContent=vb?'Editar presupuesto':'Nuevo presupuesto';
  document.getElementById('vbMonthLabel').textContent=formatMonthLabel(state.controlMonth);

    sel.appendChild(opt);
  }

  const m=document.getElementById('variableModal');m.classList.remove('hidden');m.classList.add('flex');

function closeVariableModal(){const m=document.getElementById('variableModal');m.classList.add('hidden');m.classList.remove('flex');variableEditing=null;}
function saveVariableBudget(){
  const categoryId=document.getElementById('vbCategory').value;
  const budgeted=parseFloat(document.getElementById('vbAmount').value)||0;
  if(!categoryId){showToast('Seleccioná una categoría');return;}
  if(budgeted<=0){showToast('Ingresá un monto válido');return;}
  const mk=state.controlMonth;
  if(variableEditing){
    Object.assign(variableEditing,{categoryId,budgeted});saveVB();showToast('Presupuesto actualizado');
  }else{
    const dup=state.variableBudgets.find(b=>b.categoryId===categoryId&&b.month===mk);
    if(dup){showToast('Ya existe un presupuesto para esa categoría en este mes');return;}
    state.variableBudgets.push({id:uid(),categoryId,month:mk,budgeted});saveVB();showToast('Presupuesto creado');
  }
  closeVariableModal();renderCurrentTab();
}

create extension if not exists "pgcrypto";

  category_id uuid references public.categories(id) on delete set null,
  date date not null default current_date, note text, created_at timestamptz default now()
);
create index if not exists tx_date_idx on public.transactions(date desc);
create index if not exists tx_cat_idx  on public.transactions(category_id);
